<!--
  PageSense variant assignment + form stamping.
  When Zoho PageSense runs an A/B test on this page, the variant is exposed as
  one of these globals (verify in PageSense UI):
    - window.$zoho.pagesense.experimentVariant
    - data-pagesense-variant attribute on <body>
  This script reads it and stamps LP_Variant + LP_Asset_Code into every <form>
  so the CRM Lead record captures which variant the visitor saw.
-->
<script>
(function() {
  // Read the asset code from the meta tag (single source of truth)
  var assetCodeMeta = document.querySelector('meta[name="bbl-asset-code"]');
  var assetCodeBase = assetCodeMeta ? assetCodeMeta.content : '';

  function getVariant() {
    // Returns UPPERCASE variant letter (A, B, C, Control) to match the
    // sequence-level variant convention. LP variants are sequence-level.
    // 1. PageSense API (preferred)
    try {
      if (window.$zoho && window.$zoho.pagesense && window.$zoho.pagesense.experimentVariant) {
        return String(window.$zoho.pagesense.experimentVariant).toUpperCase();
      }
    } catch (e) {}
    // 2. PageSense body data attribute
    var bodyVariant = document.body.dataset.pagesenseVariant;
    if (bodyVariant) return String(bodyVariant).toUpperCase();
    // 3. URL override (for manual testing): ?v=a
    var url = new URL(window.location.href);
    var urlVariant = url.searchParams.get('v');
    if (urlVariant) return urlVariant.toUpperCase();
    // 4. Fall back to no variant (asset has no A/B test running)
    return null;
  }

  function buildAssetCode(baseCode, variant) {
    if (!variant) return baseCode;
    // Insert variant into the code at the variant slot.
    // Format: {STAGE}-{PRODUCT}-{seq}.{ver}{VARIANT}_{PLATFORM}_{FORMAT}
    // If the base already has an uppercase variant (e.g. AWR-COMP-1.0A_WEB_LP),
    // override it with the test variant. Variant is UPPERCASE.
    return baseCode.replace(/(\d+\.\d+)[A-Z]?(_)/, '$1' + variant + '$2');
  }

  function stampForms() {
    var variant = getVariant();
    var fullCode = buildAssetCode(assetCodeBase, variant);

    document.querySelectorAll('form').forEach(function(form) {
      // Don't double-stamp
      if (form.querySelector('input[name="LP_Variant"]')) return;

      if (variant) {
        var vField = document.createElement('input');
        vField.type = 'hidden';
        vField.name = 'LP_Variant';
        vField.value = variant;
        form.appendChild(vField);
      }

      var cField = document.createElement('input');
      cField.type = 'hidden';
      cField.name = 'LP_Asset_Code';
      cField.value = fullCode;
      form.appendChild(cField);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', stampForms);
  } else {
    stampForms();
  }
})();
</script>
